name: Diagnose Feishu PR 42

on:
  pull_request:
    paths:
      - "plugins/platforms/feishu/adapter.py"
      - ".github/workflows/diagnose-feishu-pr42.yml"

permissions:
  contents: read

jobs:
  feishu-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --locked --python 3.11 --extra all --extra dev

      - name: Run Feishu-related tests with per-file isolation
        id: tests
        shell: bash
        run: |
          set +e
          : > feishu-test-output.txt
          status=0
          mapfile -d '' files < <(find tests -type f -name 'test_*feishu*.py' -print0 | sort -z)
          printf 'Discovered %s Feishu-related test files\n' "${#files[@]}" | tee -a feishu-test-output.txt
          for file in "${files[@]}"; do
            printf '\n===== %s =====\n' "$file" | tee -a feishu-test-output.txt
            .venv/bin/python -m pytest "$file" -q --tb=short >> feishu-test-output.txt 2>&1
            rc=$?
            if [ "$rc" -ne 0 ]; then
              status=1
              printf 'FAILED_FILE=%s RC=%s\n' "$file" "$rc" | tee -a feishu-test-output.txt
            fi
          done
          printf '%s\n' "$status" > feishu-test-status.txt
          tail -n 160 feishu-test-output.txt
          exit 0
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

      - name: Upload complete Feishu test output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr42-feishu-test-output
          path: |
            feishu-test-output.txt
            feishu-test-status.txt
          retention-days: 1

      - name: Fail when a Feishu test failed
        if: always()
        shell: bash
        run: |
          test "$(cat feishu-test-status.txt)" = "0"
